services:

  # ── FRONTEND: Nginx ────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  # ── BACKEND: Node + Express ────────────────────────
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - NODE_ENV=development
    env_file:
      - .env

  # ── MCP SERVER: Control desde Claude Desktop ───────
  mcp:
    build: ./backend
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    command: node mcp-server.js
    environment:
      - MCP_PORT=3001
    depends_on:
      - backend
