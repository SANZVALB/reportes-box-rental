<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-zone">
      <img src="logo-boxrental.png" alt="Box Rental S.A." class="logo-cliente" />
      <h1>Reportes Financieros</h1>
      <p>Ingresá con tu cuenta para continuar</p>
    </div>

    <!-- Formulario -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="usuario@boxrental.com"
        (keyup.enter)="login()"
      />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keyup.enter)="login()"
      />
    </div>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <button
      class="btn-login"
      (click)="login()"
      [disabled]="cargando()"
    >
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <div class="footer-firma">
      <span>Desarrollado por</span>
      <img src="logo-sanzval.png" alt="Sanzval" class="logo-sanzval" />
    </div>

  </div>
</div>
